---
layout: default
---
<article>
  <div class="post-hero">
    <div class="article-tag">{{ page.category }}</div>
    <h1>{{ page.title }}</h1>
    <p class="post-meta">{{ page.date | date: "%B %d, %Y" }} · {{ page.read_time | default: "5" }} min read</p>
  </div>

  <div class="post-body">
    {{ content }}
  </div>

  <div class="post-footer">
    <a href="{{ '/writing/' | relative_url }}" class="back-link">← All writing</a>
    <a href="{{ site.linkedin }}" target="_blank" class="back-link">Connect on LinkedIn ↗</a>
  </div>
</article>
